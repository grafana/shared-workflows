name: Export SPDX SBOM from Socket.dev API
description: Export SPDX SBOM from Socket.dev API for a given repository.

inputs:
  socket_api_token:
    description: "Socket API token for authentication"
    required: true
  socket_base_url:
    description: "Socket base url"
    required: false
    default: "https://api.socket.dev/v0"
  socket_org:
    description: "Socket org name"
    required: true
    default: "grafana"
  branch:
    description: "Branch to scan and export the SBOM for. The caller must have already checked out this branch before invoking this action."
    required: true
  output_file:
    description: "Name of the file to save the sbom"
    required: false

outputs:
  path:
    description: "Path to the exported sbom file"
    value: ${{ steps.export-sbom.outputs.path }}

runs:
  using: "composite"
  steps:
    - name: Setup Node
      uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
      with:
        node-version: "22"

    - name: Install Socket CLI
      shell: bash
      env:
        # renovate: datasource=npm depName=@socketsecurity/cli
        SOCKET_CLI_VERSION: 1.1.102
      run: npm install -g "@socketsecurity/cli@${SOCKET_CLI_VERSION}"

    - name: Create full scan for branch
      id: create-scan
      shell: bash
      env:
        SOCKET_CLI_API_TOKEN: ${{ inputs.socket_api_token }}
        SOCKET_CLI_API_BASE_URL: ${{ inputs.socket_base_url }}
        SOCKET_ORG: ${{ inputs.socket_org }}
        GITHUB_REPO_SLUG: ${{ github.repository }}
        BRANCH: ${{ inputs.branch }}
      run: |
        REPO_NAME="${GITHUB_REPO_SLUG##*/}"
        if ! SCAN_RESULT=$(socket scan create --no-interactive --org="$SOCKET_ORG" --repo="$REPO_NAME" --branch="$BRANCH" --json .); then
          echo "socket scan create failed:" >&2
          echo "$SCAN_RESULT" >&2
          exit 1
        fi
        FULL_SCAN_ID=$(jq -r '.data.id // empty' <<<"$SCAN_RESULT")
        if [[ -z "$FULL_SCAN_ID" ]]; then
          echo "socket scan create succeeded but returned no scan ID:" >&2
          echo "$SCAN_RESULT" >&2
          exit 1
        fi
        echo "full_scan_id=$FULL_SCAN_ID" >> "$GITHUB_OUTPUT"

    - name: Export SPDX SBOM from Socket.dev
      id: export-sbom
      shell: bash
      env:
        SOCKET_API_TOKEN: ${{ inputs.socket_api_token }}
        SOCKET_BASE_URL: ${{ inputs.socket_base_url }}
        SOCKET_ORG: ${{ inputs.socket_org }}
        FULL_SCAN_ID: ${{ steps.create-scan.outputs.full_scan_id }}
        OUTPUT_FILE: ${{ inputs.output_file }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        # Extract basename if output_file is provided (handles both filenames and paths)
        if [[ -n "$OUTPUT_FILE" ]]; then
          OUTPUT_FILE=$(basename "$OUTPUT_FILE")
        fi
        curl --silent --fail-with-body \
          --header "Authorization: Bearer $SOCKET_API_TOKEN" \
          "$SOCKET_BASE_URL/orgs/$SOCKET_ORG/export/spdx/$FULL_SCAN_ID" \
          --output "$ACTION_PATH/$OUTPUT_FILE"
        echo "path=$ACTION_PATH/$OUTPUT_FILE" >> "$GITHUB_OUTPUT"
