name: Trigger Argo Workflow
description: Trigger an Argo workflow in the Grafana Labs Argo Workflows instance

inputs:
  instance:
    description: |
      The instance to use (`dev` or `ops`). Defaults to `ops`.
    default: ops
  namespace:
    description: |
      Required. The namespace to trigger the workflow in.
    required: true
  parameters:
    description: |
      The newline-separated parameters to pass to the Argo workflow. Ex:

      ```
      param1=value1
      param2=value2
      ```
  workflow_template:
    description: |
      The workflow template to use. Defaults to `grafana-ci`.
    required: true
  extra_args:
    description: |
      Extra arguments to pass to the Argo CLI. Ex: `--generate-name foo-"
  log_level:
    description: |
      The log level to use. Choose from `debug`, `info`, `warn` or `error`. Defaults to `info`.
    default: info
  output_summary:
    description: |
      If `true`, write the triggered workflow URL to the GitHub job summary.
      Defaults to `false`.
    default: "false"

outputs:
  uri:
    description: |
      The URI of the workflow that was triggered.
    value: ${{ steps.run.outputs.uri }}

runs:
  using: composite

  steps:
    - name: Setup argo
      uses: grafana/shared-workflows/actions/setup-argo@21cbef8182ef0fc1c3ae8e68b9590af49ed10a5b # setup-argo/v1.2.1

    - name: Setup go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        check-latest: true
        cache-dependency-path: |
          ${{ github.action_path }}/go.sum
        go-version-file: ${{ github.action_path }}/go.mod

    - name: Map cluster and vault instance from Argo WF instance
      id: argo-instance
      env:
        INSTANCE: ${{ inputs.instance }}
      shell: sh
      run: |
        # Map the instance to the cluster name to get the correct secret
        case "${INSTANCE}" in
          dev)
            cluster="dev-us-east-0"
            vault_instance="dev"
            ;;
          ops)
            cluster="ops-eu-south-0"
            vault_instance="ops"
            ;;
          *)
            echo "unknown instance '${INSTANCE}'"
            exit 1
            ;;
        esac

        echo "name=${cluster}" | tee -a "${GITHUB_OUTPUT}"
        echo "vault-instance=${vault_instance}" | tee -a "${GITHUB_OUTPUT}"

    - name: Get Argo Token
      id: get-argo-token
      uses: grafana/shared-workflows/actions/get-vault-secrets@e46fe1e9a2bf9e618bcf8d8d32f3a7381b45c06d # get-vault-secrets/v2.0.0
      with:
        vault_instance: ${{ steps.argo-instance.outputs.vault-instance }}
        repo_secrets: |
          ARGO_TOKEN=${{ steps.argo-instance.outputs.name }}/argo-workflows-trigger:token

    - name: Run
      id: run
      shell: bash
      env:
        ARGO_TOKEN: ${{ fromJSON(steps.get-argo-token.outputs.secrets).ARGO_TOKEN }}
        EXTRA_ARGS: ${{ inputs.extra_args }}
        INSTANCE: ${{ inputs.instance }}
        LOG_LEVEL: ${{ inputs.log_level }}
        NAMESPACE: ${{ inputs.namespace }}
        PARAMETERS: ${{ inputs.parameters }}
        WORKFLOW_TEMPLATE: ${{ inputs.workflow_template }}
      run: |
        # The runner downloads the full action repository into its actions
        # cache; GITHUB_ACTION_PATH points at this action's directory there.
        cd "${GITHUB_ACTION_PATH}"

        # Split the parameters into an array and pass them to the action as --parameter PARAM
        parameters=()
        while read -r line; do
          if [ -z "${line}" ]; then
            continue
          fi

          parameters+=("--parameter" "$line")
        done <<< "${PARAMETERS}"

        if [ -n "${WORKFLOW_TEMPLATE}" ]; then
          parameters+=("--workflow-template" "${WORKFLOW_TEMPLATE}")
        fi

        # Explicitly disable Go workspace support in case the repo uses that:
        export GOWORK=off

        go run github.com/grafana/shared-workflows/actions/trigger-argo-workflow/cmd/trigger-argo-workflow \
          --log-level "${LOG_LEVEL}" \
          --namespace "${NAMESPACE}" \
          --instance "${INSTANCE}" \
          "${parameters[@]}" \
          submit \
          ${EXTRA_ARGS}

    - name: Write workflow URL to job summary
      if: ${{ inputs.output_summary == 'true' }}
      shell: bash
      env:
        WORKFLOW_URI: ${{ steps.run.outputs.uri }}
      run: |
        echo "### Argo Workflow" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "Triggered workflow: [${WORKFLOW_URI}](${WORKFLOW_URI})" >> "$GITHUB_STEP_SUMMARY"
