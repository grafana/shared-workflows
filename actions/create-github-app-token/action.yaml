name: Create GitHub App Token
description: |
  Get an ephemeral GitHub App installation token from Vault. Registers a
  post-job step that revokes the underlying Vault token, which cascade-revokes
  the GitHub App token as soon as the job finishes (success or failure).
inputs:
  permission_set:
    description: Permission set name.
    default: default
  github_app:
    description: |
      GitHub app name in Vault. You can define multiple apps for load
      balancing in a comma-separated format.
    required: true
  vault_instance:
    description: |
      The Vault instance to use (`dev` or `ops`). Defaults to `ops`.
    default: ops
outputs:
  token:
    description: GitHub installation access token.
runs:
  using: node24
  main: main.js
  post: post.js
  post-if: always()
