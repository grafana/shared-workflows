name: Dockerfile Hardening
description: Scan Dockerfiles for baseline hardening requirements

inputs:
  dockerfiles:
    description: |
      Newline- or space-separated list of Dockerfile paths (relative to the
      caller's workspace) to scan.
    required: true
  conftest-version:
    description: |
      Version of conftest to install.
    default: "0.55.0"

runs:
  using: composite

  steps:
    - name: Checkout shared-workflows
      env:
        action_repo: "${{ github.action_repository || 'grafana/shared-workflows' }}"
        action_ref: ${{ github.action_ref }}
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        repository: ${{ env.action_repo }}
        ref: ${{ env.action_ref }}
        path: _shared-workflows-dockerfile-hardening
        persist-credentials: false

    - name: Validate conftest-version
      shell: bash
      env:
        CONFTEST_VERSION: ${{ inputs.conftest-version }}
      run: |
        set -euo pipefail
        if ! [[ "${CONFTEST_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            printf "ERROR: invalid conftest-version: %q (expected semver x.y.z)\n" "${CONFTEST_VERSION}" >&2
            exit 1
        fi

    - name: Setup Conftest
      uses: ./_shared-workflows-dockerfile-hardening/actions/setup-conftest
      with:
        version: ${{ inputs.conftest-version }}

    - name: Run Conftest
      env:
        DOCKERFILES: ${{ inputs.dockerfiles }}
      shell: bash
      working-directory: ${{ github.workspace }}/_shared-workflows-dockerfile-hardening/actions/dockerfile-hardening
      run: bash ./run-conftest.sh verify-dockerfiles
