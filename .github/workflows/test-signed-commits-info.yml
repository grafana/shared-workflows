name: Test signed-commits-info action

on:
  push:
    branches:
      - main
    paths:
      - actions/signed-commits-info/**
      - .github/workflows/test-signed-commits-info.yml

  pull_request:
    paths:
      - actions/signed-commits-info/**
      - .github/workflows/test-signed-commits-info.yml
    types:
      - edited
      - opened
      - ready_for_review
      - synchronize

  merge_group:

permissions:
  contents: read

jobs:
  test-signed-commits-info-action:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./actions/signed-commits-info

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run test

      - name: Run typecheck
        run: bun run typecheck

      - name: Check for drift
        run: |
          set -e
          bun run build
          git diff --exit-code dist/
