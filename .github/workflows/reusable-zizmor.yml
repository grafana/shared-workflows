name: zizmor (reusable)

on:
  workflow_call:
    inputs:
      min-severity:
        description: "Only show results at or above this severity [possible values: unknown, informational, low, medium, high]"
        required: false
        type: string
        default: "low"

      min-confidence:
        description: "Only show results at or above this confidence level [possible values: unknown, low, medium, high]"
        required: false
        type: string
        default: "low"

      fail-severity:
        description: "Fail the build if any result is at or above this severity [possible values: never, any, informational, low, medium, high]"
        required: false
        type: string
        default: "high"

      runs-on:
        description: "The runner to use for jobs"
        required: false
        type: string
        default: "ubuntu-latest"

      github-token:
        description: Use a different token to the default
        required: false
        type: string
        default: ${{ github.token }}

      always-use-default-config:
        description: |
          Whether to always use the default configuration. When `false`,
          `.zizmor.yml` or `.github/zizmor.yml` will be used, if present.
        required: false
        type: boolean
        default: false

      extra-args:
        description: Extra arguments to pass to Zizmor
        required: false
        type: string
        default: ""

      send-bench-metrics:
        description: If true, run Grafana Bench after analysis (Vault Prometheus creds). Job only runs for grafana org and non-fork PRs; fork PRs have no OIDC/Vault access.
        required: false
        type: boolean
        default: true

      auto-delete-dangerous-branches:
        description: >
          If true, automatically delete non-default branches on push events
          when zizmor finds dangerous-triggers findings. Sends a Slack
          notification before deletion. Caller must grant contents:write and
          id-token:write permissions.
        required: false
        type: boolean
        default: false

      auto-delete-slack-channel-id:
        description: Slack channel ID to notify before deleting a branch.
        required: false
        type: string
        default: ""

permissions: {}

jobs:
  # The default config file is in `.github/zizmor.yml`. When we're called by a
  # remote repository, this file won't be available - in reusable workflows the
  # workflow's repo isn't checked out. In order to make something like:
  #
  # ```yaml
  # uses: grafana/shared-workflows/.github/workflows/reusable-zizmor.yml@<SHA>`
  # ```
  #
  # work, we need to figure out the reference we were called at, and then fetch
  # the file from there. This `job-workflow-ref` job does the first part of
  # that. The way to do that is a little bit indirect. You can ask GitHub's OIDC
  # endpoint for a token, and fetch the info out of the `job_workflow_ref`claim.
  # This runs in a separate job because the main job doesn't need `id-token:
  # write` permissons, and this one doesn't need anything but that. We can keep
  # the permissions as minimal as possible this way.
  job-workflow-ref:
    permissions:
      id-token: write

    runs-on: ${{ inputs.runs-on }}

    outputs:
      owner: ${{ steps.get-job-workflow-ref.outputs.owner }}
      repo: ${{ steps.get-job-workflow-ref.outputs.repo }}
      sha: ${{ steps.get-job-workflow-ref.outputs.sha }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - id: setup-node
        name: Setup node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22.x"

      - id: install-jose
        name: Install `jose` library for JWT verification
        env:
          # Keep this updated in a simpler way than needing a full package.json.
          # renovate: datasource=npm depName=jose
          JOSE_VERSION: 6.2.3
        run: npm install "jose@${JOSE_VERSION}"

      - id: get-job-workflow-ref
        name: Fetch the job_workflow_ref of this run
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { jwtVerify, createRemoteJWKSet } = require('jose');

            async function retrieveIdToken(audience) {
              // Perform an explicit check to see if we can get the ID token or
              // not, so we can show a better error.
              const runtimeUrl = process.env['ACTIONS_ID_TOKEN_REQUEST_URL']
              if (!runtimeUrl) {
                throw new Error(
                  "We're unable to look up the version of the Zizmor workflow being called, so we can't fetch the `grafana` default configuration. Zizmor's own default will be used. Is the `id-token: write` permission set? If so, is this a run from a fork? Unfortunately we're unable to do this lookup for pull requests from forks currently."
                )
              }

              core.debug(`Attempting to retrieve ID token with audience: ${audience}...`);

              const idToken = await core.getIDToken(audience);
              if (idToken === undefined) {
                throw new Error('Failed to retrieve ID token');
              }

              core.debug('ID token retrieved successfully.');
              return idToken;
            }

            async function verifyToken(idToken, audience) {
              const JWKS = createRemoteJWKSet(
                new URL('https://token.actions.githubusercontent.com/.well-known/jwks')
              );

              return await jwtVerify(
                idToken,
                JWKS,
                {
                  issuer: 'https://token.actions.githubusercontent.com',
                  audience: audience,
                }
              );
            }

            function extractWorkflowRef(payload) {
              const { job_workflow_ref } = payload;
              if (job_workflow_ref === undefined) {
                throw new Error(`Claim 'job_workflow_ref' not found in ID token payload.\n\n${JSON.stringify(payload, null, 2)}`);
              }

              core.debug(`Found job_workflow_ref claim: ${job_workflow_ref}`);
              return job_workflow_ref;
            }

            function parseWorkflowRef(job_workflow_ref) {
              // Format: owner/repo/.github/workflows/workflow.yml@ref
              const regex = /^(?<owner>[^/]+)\/(?<repo>[^/]+)\/.+@(?<ref>.+)$/;
              const match = job_workflow_ref.match(regex);

              if (!match || !match.groups) {
                throw new Error(`Failed to parse owner, repo and ref from \`job_workflow_ref\` claim \`${job_workflow_ref}\``);
              }

              const { owner, repo, ref } = match.groups;

              return { owner, repo, ref };
            }

            /**
             * Derefence the input ref to a SHA. This is because we cache the
             * file, and refs can be updated to point to other objects, so they
             * aren't suitable cache keys.
             */
            async function getRefSha(owner, repo, ref) {
              if (!ref.startsWith('refs/')) {
                return ref;
              }

              core.debug(`Getting SHA for ref: ${ref} in ${owner}/${repo}`);

              // Remove `refs/` from the start, as the API expects a reference
              // without it.
              ref = ref.substring(5);

              try {
                const response = await github.rest.git.getRef({
                  owner,
                  repo,
                  ref,
                });

                const sha = response.data.object.sha;
                core.debug(`Found SHA: ${sha} for ref: ${ref}`);

                return sha;
              } catch (error) {
                throw new Error(`Failed to resolve ref ${ref} to a SHA: ${error.message}`);
              }
            }

            const AUDIENCE = 'zizmor-job-workflow-ref';

            // Fork PRs (and some other contexts) have no OIDC token. Detect that
            // up front and use fallback without throwing, so the step succeeds
            // and the log stays clear.
            const runtimeUrl = process.env['ACTIONS_ID_TOKEN_REQUEST_URL'];
            if (!runtimeUrl) {
              core.info(
                "No OIDC token available (e.g. pull request from a fork). Using fallback: grafana/shared-workflows@main for default config."
              );
              core.setOutput('owner', 'grafana');
              core.setOutput('repo', 'shared-workflows');
              core.setOutput('sha', 'main');
            } else {
              try {
                const idToken = await retrieveIdToken(AUDIENCE);

                const { payload } = await verifyToken(idToken, AUDIENCE);

                const job_workflow_ref = extractWorkflowRef(payload);

                const { owner, repo, ref } = parseWorkflowRef(job_workflow_ref);
                const sha = await getRefSha(owner, repo, ref);

                console.log(`This run is: owner: \`${owner}\`, repo: \`${repo}\`, ref: \`${ref}\`, sha: ${sha}`);

                core.setOutput('owner', owner);
                core.setOutput('repo', repo);
                core.setOutput('sha', sha);
              } catch (error) {
                core.error(`Script failed: ${error.message}`);
                if (error.stack) {
                  console.error(`Stack trace: ${error.stack}`);
                }
                core.info('Using fallback: grafana/shared-workflows@main for default config.');
                core.setOutput('owner', 'grafana');
                core.setOutput('repo', 'shared-workflows');
                core.setOutput('sha', 'main');
              }
            }

  analysis:
    needs: job-workflow-ref

    name: Generate and upload zizmor results 🌈

    runs-on: ${{ inputs.runs-on }}

    outputs:
      has-dangerous-triggers: ${{ steps.check-dangerous-triggers.outputs.found }}

    permissions:
      actions: read
      contents: read

      # fallback: comment on PR when code-scanning upload is unavailable
      # (private repos without Advanced Security)
      pull-requests: write
      # upload the results to code-scanning dashboard.
      security-events: write

    env:
      MIN_SEVERITY: ${{ inputs.min-severity }}
      MIN_CONFIDENCE: ${{ inputs.min-confidence }}
      # renovate: datasource=pypi depName=zizmor
      ZIZMOR_VERSION: 1.25.2
      GH_TOKEN: ${{ inputs.github-token || github.token }}
      ZIZMOR_EXTRA_ARGS: ${{ inputs.extra-args }}
      DEFAULT_ZIZMOR_CONFIG_DOWNLOADED: ${{ needs.job-workflow-ref.outputs.sha }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        if: ${{ ! github.event.repository.private }}
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Restore config from cache
        id: cache-config
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        if: env.DEFAULT_ZIZMOR_CONFIG_DOWNLOADED
        with:
          path: ${{ runner.temp }}/zizmor.yml
          key: zizmor-config-${{ needs.job-workflow-ref.outputs.repo }}-${{ needs.job-workflow-ref.outputs.sha }}

      - name: Fetch Zizmor Config
        id: fetch-config
        if: steps.cache-config.outputs.cache-hit != 'true' && env.DEFAULT_ZIZMOR_CONFIG_DOWNLOADED
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          OWNER: ${{ needs.job-workflow-ref.outputs.owner }}
          REPO: ${{ needs.job-workflow-ref.outputs.repo }}
          SHA: ${{ needs.job-workflow-ref.outputs.sha }}
        with:
          script: |
            const fs = require('fs').promises;
            const path = require('path');

            const owner = process.env.OWNER;
            const repo = process.env.REPO;
            const sha = process.env.SHA;

            if (!owner || !repo || !sha) {
              core.warning('Missing owner, repo or sha. Did the job-workflow-ref step run OK?');

              return;
            }

            console.log(`Fetching config from ${owner}/${repo}@${sha}`);

            try {
              const response = await github.rest.repos.getContent({
                owner,
                repo,
                path: '.github/zizmor.yml',
                ref: sha
              });

              // File exists, decode content from base64
              if (response.status !== 200 || response.data.content === undefined) {
                throw new Error(`received unexpected response: ${response.status}`);
              }

              const contentBase64 = response.data.content;
              const configContent = Buffer.from(contentBase64, 'base64').toString('utf8');

              console.log('Config file successfully fetched from GitHub. Contents:');
              console.log(configContent);

              const destinationPath = path.join(process.env.RUNNER_TEMP, 'zizmor.yml');
              await fs.writeFile(destinationPath, configContent);
            } catch (err) {
              // Don't fail the workflow on errors - we just won't have a
              // default config.

              if ('status' in err && err.status === 404) {
                core.warning('Config file not found in repository');
                return;
              }

              core.error(`Error fetching config: ${err.message}`);
              if (err.stack) {
                core.error(`Stack trace: ${err.stack}`);
              }

              return;
            }

      - name: Set up Zizmor configuration
        id: setup-config
        env:
          FORCE_DEFAULT_CONFIG: ${{ inputs.always-use-default-config && 'true' || '' }}
        shell: sh
        run: |
          if [ -z "${FORCE_DEFAULT_CONFIG}" ]; then
            echo "Checking for user-provided zizmor configuration..."
            if [ -f "zizmor.yml" ]; then
              # No action needed, zizmor will find it
              echo "Using zizmor.yml found in repository root."
              echo "repo-local-zizmor-config=zizmor.yml" >> "${GITHUB_OUTPUT}"
              exit 0
            fi

            if [ -f ".github/zizmor.yml" ]; then
              # No action needed, zizmor will find it
              echo "Using .github/zizmor.yml found in repository."
              echo "repo-local-zizmor-config=.github/zizmor.yml" >> "${GITHUB_OUTPUT}"
              exit 0
            fi

            echo "No user-provided zizmor.yml found in root or .github/. Using default zizmor config."
          else
            echo "always-use-default-config is set. Using default config."
          fi

          ZIZMOR_CONFIG_PATH="${{ runner.temp }}/zizmor.yml"
          if [ -n "${DEFAULT_ZIZMOR_CONFIG_DOWNLOADED}" ]; then
            echo "zizmor-config=${ZIZMOR_CONFIG_PATH}" | tee -a "${GITHUB_OUTPUT}"
          fi

      - name: Setup UV
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          activate-environment: true
          cache-suffix: ${{ env.ZIZMOR_VERSION }}
          cache-dependency-glob: ""

      - name: Validate repo-local zizmor config policy
        id: validate-config
        continue-on-error: true
        if: ${{ inputs.always-use-default-config == false && steps.setup-config.outputs.zizmor-config == '' && steps.setup-config.outputs['repo-local-zizmor-config'] != '' }}
        uses: grafana/shared-workflows/actions/validate-zizmor-config@84a7e1d935b2240eb5dcc3ee4dc0a6692057e94d # validate-zizmor-config/v0.2.0
        with:
          config_path: ${{ steps.setup-config.outputs['repo-local-zizmor-config'] }}
          sarif_output: results.sarif

      - name: Zizmor cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ runner.temp }}/.cache/zizmor
          key: zizmor-${{ runner.os }}-${{ runner.arch }}

      - name: Run zizmor
        if: steps.validate-config.outcome != 'failure'
        env:
          ZIZMOR_CONFIG_PATH: ${{ steps.setup-config.outputs.zizmor-config }}
          ZIZMOR_CACHE_DIR: ${{ runner.temp }}/.cache/zizmor
        shell: sh
        run: |
          uvx zizmor@"${ZIZMOR_VERSION}" \
            --format sarif \
            --min-severity "${MIN_SEVERITY}" \
            --min-confidence "${MIN_CONFIDENCE}" \
            --cache-dir "${ZIZMOR_CACHE_DIR}" \
            ${ZIZMOR_CONFIG_PATH:+--config "${ZIZMOR_CONFIG_PATH}"} \
            ${RUNNER_DEBUG:+"--verbose"} \
            ${ZIZMOR_EXTRA_ARGS:+${ZIZMOR_EXTRA_ARGS}} \
            . \
            > results.sarif
          exit_code=$?
          # Only fail on exit code 1 (zizmor crash). 0 = no findings, 10-14 = findings by severity.
          if [ "${exit_code}" -eq 1 ]; then exit 1; fi
          exit 0

      - name: Upload artifact
        if: ${{ !cancelled() && hashFiles('results.sarif') != '' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Check for dangerous-triggers findings
        id: check-dangerous-triggers
        if: ${{ !cancelled() && hashFiles('results.sarif') != '' }}
        shell: bash
        run: |
          DANGEROUS=$(python3 -c "
          import json
          sarif = json.load(open('results.sarif'))
          hits = [
              r for run in sarif.get('runs', [])
              for r in run.get('results', [])
              if 'dangerous-triggers' in r.get('ruleId', '')
          ]
          print(len(hits))
          ")
          if [ "${DANGEROUS}" -gt 0 ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to code-scanning
        id: upload-sarif
        if: ${{ !cancelled() && hashFiles('results.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        continue-on-error: true
        with:
          sarif_file: results.sarif
          category: zizmor

      - name: Run zizmor with plain output
        if: always()
        id: zizmor-plain
        shell: bash
        env:
          NO_COLOR: 1
          VALIDATE_CONFIG_OUTCOME: ${{ steps.validate-config.outcome }}
          REPO_LOCAL_ZIZMOR_CONFIG: ${{ steps.setup-config.outputs['repo-local-zizmor-config'] }}
          ZIZMOR_CONFIG_PATH: ${{ steps.setup-config.outputs.zizmor-config }}
          ZIZMOR_CACHE_DIR: ${{ runner.temp }}/.cache/zizmor
        run: |
          set -o pipefail

          echo "zizmor-results<<EOF" >> "${GITHUB_OUTPUT}"

          if [ "${VALIDATE_CONFIG_OUTCOME}" = "failure" ]; then
            echo "Repo-local zizmor config policy validation failed for ${REPO_LOCAL_ZIZMOR_CONFIG}."
            if [ -f results.sarif ]; then
              python3 - <<'PY' | tee -a "${GITHUB_OUTPUT}"
          import json
          from pathlib import Path

          sarif = json.loads(Path("results.sarif").read_text(encoding="utf-8"))
          for run in sarif.get("runs", []):
              for result in run.get("results", []):
                  print(result.get("message", {}).get("text", result))
          PY
            fi
            echo "EOF" >> "${GITHUB_OUTPUT}"
            echo "zizmor-exit-code=14" | tee -a "${GITHUB_OUTPUT}"
            exit 0
          fi

          # Run zizmor again with plain output for human-readable logs.
          # Don't fail the build here - we capture the exit code for the
          # "Fail the build" step to evaluate against fail-severity.
          # Output is also captured for the fallback PR comment when
          # Code Scanning is unavailable.
          set +e
          uvx zizmor@"${ZIZMOR_VERSION}" \
            --format plain \
            --min-severity "${MIN_SEVERITY}" \
            --min-confidence "${MIN_CONFIDENCE}" \
            --cache-dir "${ZIZMOR_CACHE_DIR}" \
            ${RUNNER_DEBUG:+"--verbose"} \
            ${ZIZMOR_CONFIG_PATH:+--config "${ZIZMOR_CONFIG_PATH}"} \
            ${ZIZMOR_EXTRA_ARGS:+${ZIZMOR_EXTRA_ARGS}} \
            . \
            | tee -a "${GITHUB_OUTPUT}"
          zizmor_exit_code=$?
          set -e
          echo "EOF" >> "${GITHUB_OUTPUT}"

          # Error 1 is a failure of zizmor itself
          if [ "${zizmor_exit_code}" -eq 1 ]; then
            echo "zizmor itself failed - check the above output. failing the workflow."
            exit 1
          fi

          echo "zizmor-exit-code=${zizmor_exit_code}" | tee -a "${GITHUB_OUTPUT}"

      - name: Remove zizmor config
        env:
          ZIZMOR_CONFIG_PATH: ${{ steps.setup-config.outputs.zizmor-config }}
        if: steps.setup-config.outputs.zizmor-config
        run: rm "${ZIZMOR_CONFIG_PATH}"

      # Fallback: post a PR comment with findings when Code Scanning is
      # unavailable (e.g. private repos without Advanced Security).
      - name: Hide any previous comments
        if: ${{ !cancelled() && steps.upload-sarif.outcome == 'failure' && github.event.pull_request.head.repo.full_name == github.repository }}
        id: hide-comments
        uses: int128/hide-comment-action@42ef2bf9a7d8751219e33ff76f19752fee8decec # v1.61.0
        with:
          ends-with: "<!-- comment-action/${{ github.workflow }}/${{ github.job }} -->"

      - name: Comment with zizmor results
        if: steps.upload-sarif.outcome == 'failure' && steps.zizmor-plain.outputs.zizmor-exit-code != 0 && github.event.pull_request.head.repo.full_name == github.repository
        uses: int128/comment-action@36914110eb9d2010cc18858459e9ad3e5694d9e8 # v1.63.0
        with:
          post: |
            :cry: zizmor failed with exit code ${{ steps.zizmor-plain.outputs.zizmor-exit-code }}.

            <details>
            <summary>Expand for full output</summary>

            ```
            ${{ steps.zizmor-plain.outputs.zizmor-results }}
            ```
            </details>
            ${{ steps.hide-comments.outputs.ends-with }}

      - name: Fail on repo-local config policy violation
        if: steps.validate-config.outcome == 'failure'
        run: |
          echo "Failing the build: repo-local zizmor config violates Grafana policy."
          exit 1

      - name: Fail the build
        if: inputs.fail-severity != 'never' && steps.validate-config.outcome != 'failure' && steps.zizmor-plain.outputs.zizmor-exit-code != 0
        shell: sh
        env:
          FAIL_LEVEL: ${{ inputs.fail-severity }}
          EXIT_CODE: ${{ steps.zizmor-plain.outputs.zizmor-exit-code }}
        run: |
          case "${FAIL_LEVEL}" in
            any)
              FAIL_EXIT_CODE=10
              ;;
            informational)
              FAIL_EXIT_CODE=11
              ;;
            low)
              FAIL_EXIT_CODE=12
              ;;
            medium)
              FAIL_EXIT_CODE=13
              ;;
            high)
              FAIL_EXIT_CODE=14
              ;;
            *)
              echo "Unknown fail level: ${FAIL_LEVEL}"
              exit 1
              ;;
          esac

          if [ "${EXIT_CODE}" -ge "${FAIL_EXIT_CODE}" ]; then
            echo "Failing the build due to findings at or above ${FAIL_LEVEL} severity."
            exit 1
          fi

  grafana-bench:
    name: Send zizmor metrics to Prometheus via Grafana Bench
    continue-on-error: true
    needs: [analysis, job-workflow-ref]
    # Only run for grafana org and non-fork PRs (fork PRs have no OIDC/Vault access).
    if: ${{ github.repository_owner == 'grafana' && (github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork) && inputs.send-bench-metrics && always() && !cancelled() && (needs.analysis.result == 'success' || needs.analysis.result == 'failure') }}
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - id: get-secrets
        name: Get Prometheus secrets from Vault
        uses: grafana/shared-workflows/actions/get-vault-secrets@4e6a096e033d00f25363adb1dc75b7e56ecdb7c6
        with:
          common_secrets: |
            PROMETHEUS_URL=grafana-bench:prometheus_url
            PROMETHEUS_USER=grafana-bench:prometheus_user
            PROMETHEUS_PASSWORD=grafana-bench:prometheus_token

      - name: Download SARIF artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: SARIF file

      - name: Run Grafana Bench (Docker image)
        env:
          BENCH_SERVICE: ${{ format('grafana-{0}', github.event.repository.name) }}
          BENCH_SUITE_NAME: ${{ github.event.repository.name }}/zizmor
          BENCH_SERVICE_VERSION: ${{ github.sha }}
          # renovate: datasource=github-releases packageName=grafana/grafana-bench
          BENCH_VERSION: "v1.0.11"
          PROMETHEUS_URL: ${{ fromJSON(steps.get-secrets.outputs.secrets).PROMETHEUS_URL }}
          PROMETHEUS_USER: ${{ fromJSON(steps.get-secrets.outputs.secrets).PROMETHEUS_USER }}
          PROMETHEUS_PASSWORD: ${{ fromJSON(steps.get-secrets.outputs.secrets).PROMETHEUS_PASSWORD }}
        run: |
          BENCH_IMAGE="ghcr.io/grafana/grafana-bench:${BENCH_VERSION}"
          SARIF_FILE=$(find . -name "*.sarif" -type f | head -n 1)
          if [ -z "${SARIF_FILE}" ]; then
            echo "::error::No SARIF file found; analysis job must upload the SARIF artifact."
            exit 1
          fi
          if [ -z "${PROMETHEUS_URL}" ]; then
            echo "::error::PROMETHEUS_URL not set; Vault step may have failed or export_env is false."
            exit 1
          fi
          echo "PROMETHEUS_URL is set (length ${#PROMETHEUS_URL}); running bench report..."
          if ! docker pull "${BENCH_IMAGE}"; then
            echo "Could not pull Bench image; skipping bench step."
            exit 0
          fi
          docker run --rm \
            --network=host \
            --volume="${PWD}:/tests/" \
            -e PROMETHEUS_URL="${PROMETHEUS_URL}" \
            -e PROMETHEUS_USER="${PROMETHEUS_USER}" \
            -e PROMETHEUS_PASSWORD="${PROMETHEUS_PASSWORD}" \
            "${BENCH_IMAGE}" report \
            --report-input zizmor \
            --service "${BENCH_SERVICE}" \
            --service-version "${BENCH_SERVICE_VERSION}" \
            --suite-name "${BENCH_SUITE_NAME}" \
            --run-stage ci \
            --report-output log \
            --log-level debug \
            --prometheus-metrics \
            "/tests/${SARIF_FILE#./}"

  delete-vulnerable-branch:
    name: Delete branch with dangerous-trigger vulnerability
    needs: analysis
    if: >-
      always() &&
      inputs.auto-delete-dangerous-branches &&
      needs.analysis.outputs.has-dangerous-triggers == 'true' &&
      (github.event_name == 'push' || github.event_name == 'pull_request') &&
      (github.event_name != 'push' || github.ref != format('refs/heads/{0}', github.event.repository.default_branch))
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Validate inputs
        env:
          SLACK_CHANNEL_ID: ${{ inputs.auto-delete-slack-channel-id }}
        run: |
          if [ -z "${SLACK_CHANNEL_ID}" ]; then
            echo "::error::auto-delete-slack-channel-id must be set when auto-delete-dangerous-branches is true"
            exit 1
          fi

      - name: Delete branch
        id: delete-branch
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          REF: ${{ github.event_name == 'pull_request' && format('refs/heads/{0}', github.head_ref) || github.ref }}
          REPO: ${{ github.repository }}
        run: |
          gh api -X DELETE "repos/${REPO}/git/${REF}"

      - name: Build Slack notification payload
        id: slack-payload
        env:
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
          ACTOR: ${{ github.event_name == 'pull_request' && github.event.pull_request.user.login || github.actor }}
          SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SLACK_CHANNEL_ID: ${{ inputs.auto-delete-slack-channel-id }}
          DELETE_OUTCOME: ${{ steps.delete-branch.outcome }}
        run: |
          python3 <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os

          channel = os.environ["SLACK_CHANNEL_ID"]
          repo = os.environ["REPO"]
          ref_name = os.environ["REF_NAME"]
          actor = os.environ["ACTOR"]
          sha = os.environ["SHA"]
          run_url = os.environ["RUN_URL"]
          deleted = os.environ["DELETE_OUTCOME"] == "success"

          def slack_escape(value):
              return str(value).replace("&", "&amp;").replace("<", "&lt;").replace(">", "&gt;")

          if deleted:
              headline = ":white_check_mark: *Branch auto-deleted due to vulnerable GitHub Actions workflow*"
              fallback = f"zizmor deleted branch {slack_escape(ref_name)} in {slack_escape(repo)} after finding a dangerous-trigger workflow vulnerability."
              action_text = f"<{run_url}|Review the workflow run logs>, fix the workflow locally, then push the branch again."
          else:
              headline = ":rotating_light: *ACTION REQUIRED — failed to delete branch with dangerous workflow*"
              fallback = f"zizmor found a dangerous-trigger vulnerability on branch {slack_escape(ref_name)} in {slack_escape(repo)} but could not delete it. Manual action required."
              action_text = f"Automatic deletion failed. <{run_url}|Review the workflow run logs> and *manually delete the branch `{slack_escape(ref_name)}`* immediately."

          payload = {
              "channel": channel,
              "text": fallback,
              "blocks": [
                  {
                      "type": "section",
                      "text": {"type": "mrkdwn", "text": headline},
                  },
                  {
                      "type": "section",
                      "fields": [
                          {"type": "mrkdwn", "text": f"*Repository:*\n{slack_escape(repo)}"},
                          {"type": "mrkdwn", "text": f"*Branch:*\n{slack_escape(ref_name)}"},
                          {"type": "mrkdwn", "text": f"*Pushed by:*\n{slack_escape(actor)}"},
                          {"type": "mrkdwn", "text": f"*Commit:*\n`{sha}`"},
                      ],
                  },
                  {
                      "type": "section",
                      "text": {
                          "type": "mrkdwn",
                          "text": (
                              "zizmor found a `dangerous-triggers` finding in a workflow on this branch. "
                              "Triggers such as `pull_request_target`, `issue_comment`, `issues`, or "
                              "`workflow_run` can be exploitable the moment they exist on any branch."
                          ),
                      },
                  },
                  {
                      "type": "section",
                      "text": {"type": "mrkdwn", "text": action_text},
                  },
              ],
          }

          print("payload<<EOF")
          print(json.dumps(payload))
          print("EOF")
          PY

      - name: Notify Slack
        uses: grafana/shared-workflows/actions/send-slack-message@eb1fbd807f87aea8f40ff08dc9cd02872cad55b3 # send-slack-message/v2.0.5
        with:
          method: chat.postMessage
          payload: ${{ steps.slack-payload.outputs.payload }}
          payload-templated: false

      - name: Fail if branch deletion failed
        if: steps.delete-branch.outcome == 'failure'
        run: |
          echo "::error::Branch deletion failed — Slack notification sent as action-required alert"
          exit 1
