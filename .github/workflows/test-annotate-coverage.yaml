name: Test annotate-coverage action

on:
  push:
    branches:
      - main
    paths:
      - "actions/annotate-coverage/**"
      - ".github/workflows/test-annotate-coverage.yaml"

  pull_request:
    paths:
      - "actions/annotate-coverage/**"
      - ".github/workflows/test-annotate-coverage.yaml"
    types:
      - edited
      - opened
      - ready_for_review
      - synchronize

  merge_group:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write # needed for cache

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          check-latest: true
          go-version-file: "actions/annotate-coverage/go.mod"
          cache-dependency-path: "actions/annotate-coverage/go.sum"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: latest
          working-directory: actions/annotate-coverage

      - name: Test Go code
        shell: bash
        working-directory: actions/annotate-coverage
        run: go test -race -short ./...
