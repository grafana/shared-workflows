name: Test Component Change Detection

on:
  push:
    branches:
      - main
    paths:
      - actions/component-change-detection/**
      - .github/workflows/test-component-change-detection.yml

  pull_request:
    paths:
      - actions/component-change-detection/**
      - .github/workflows/test-component-change-detection.yml
    types:
      - edited
      - opened
      - ready_for_review
      - synchronize

  merge_group:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Test Component Change Detection
        id: test
        uses: ./actions/component-change-detection
        with:
          config-file: actions/component-change-detection/test-fixtures/.component-deps.yaml
          previous-tags-source: test-workflow-nonexistent.yml
          target-ref: HEAD

      - name: Validate outputs
        env:
          CHANGES_JSON: ${{ steps.test.outputs.changes_json }}
          COMPONENTS_JSON: ${{ steps.test.outputs.components_json }}
        run: ./actions/component-change-detection/scripts/validate-outputs.sh
